<ion-header [translucent]="true">
  <ion-toolbar color="secondary">
    <ion-title class="ion-text-center">Members</ion-title>

    <ion-buttons slot="start">
      <ion-button>
        <ion-icon name="menu-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button>
        <ion-icon name="notifications" slot="icon-only"></ion-icon>
      </ion-button>

      <ion-button color="primary">
        <ion-icon name="add-circle" slot="icon-only"></ion-icon>
      </ion-button>

    </ion-buttons>

  </ion-toolbar>

  <ion-toolbar color="secondary">
    <ion-searchbar class="srchBar" placeholder="Search Name/ Mobile Number"></ion-searchbar>

    <ion-row>
      <ion-col size="4">
        <div>
          <ion-select value="All Packages" interface="popover" label="" justify="start">
            <ion-select-option value="All Packages">All Packages</ion-select-option>
            <ion-select-option value="Monthly Packages">Monthly Packages</ion-select-option>
          </ion-select>
        </div>
      </ion-col>

      <ion-col size="4">
        <div>
          <ion-select value="All Types" interface="popover" label="" justify="start">
            <ion-select-option value="All Types">All Types</ion-select-option>
            <ion-select-option value="Student Membership">Student Membership</ion-select-option>
            <ion-select-option value="Corporate Membership">Corporate Membership</ion-select-option>
          </ion-select>
        </div>
      </ion-col>

      <ion-col size="4">
        <div>
          <ion-select value="Select Batch" interface="popover" label="" justify="start">
            <ion-select-option value="Select Batch">Select Batch</ion-select-option>
            <ion-select-option value="Morning Batch">Morning Batch</ion-select-option>
            <ion-select-option value="Evening Batch">Evening Batch</ion-select-option>
          </ion-select>
        </div>
      </ion-col>

    </ion-row>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" color="light">
  <ion-list>
    <ion-item-divider color="light" mode="ios">
      Members
      <div slot="end">
        <ion-select value="All Packages" interface="popover" label="" justify="start">
          <ion-select-option value="All Packages">All Packages</ion-select-option>
          <ion-select-option value="Monthly Packages">Monthly Packages</ion-select-option>
        </ion-select>
      </div>
    </ion-item-divider>
  </ion-list>
</ion-content>
